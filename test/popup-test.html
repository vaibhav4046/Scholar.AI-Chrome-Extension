<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ScholarAI (test harness)</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="popup">
  <!-- chrome.* shim BEFORE popup.js -->
  <script>
  (() => {
    const store = { local: {}, session: {} };
    const listeners = [];
    const proxy = (which) => ({
      get: (keys) => Promise.resolve(
        Array.isArray(keys) ? Object.fromEntries(keys.map(k => [k, store[which][k]]))
        : keys === null || keys === undefined ? { ...store[which] }
        : typeof keys === "string" ? { [keys]: store[which][keys] }
        : Object.fromEntries(Object.keys(keys).map(k => [k, store[which][k] ?? keys[k]]))
      ),
      set: (kv) => { Object.assign(store[which], kv); return Promise.resolve(); },
      clear: () => { for (const k of Object.keys(store[which])) delete store[which][k]; return Promise.resolve(); },
      remove: (k) => { delete store[which][k]; return Promise.resolve(); },
    });
    const responses = {
      fetchUrl: (msg) => {
        const u = msg.url;
        if (u.includes("404")) return { error: "HTTP 404" };
        if (u.includes("timeout")) return { error: "Gemini request timed out after 90s." };
        return {
          title: "Attention Is All You Need",
          source: "arXiv",
          url: u,
          text: "We propose the Transformer, a new simple network architecture based entirely on attention mechanisms, dispensing with recurrence and convolutions entirely. ".repeat(50),
          authors: "Vaswani A., Shazeer N., Parmar N., Uszkoreit J., Jones L., Gomez A. N., Kaiser L., Polosukhin I.",
          year: "2017",
          doi: "10.48550/arXiv.1706.03762",
        };
      },
      analyzePaper: () => ({
        analysis: {
          summary: "Introduces the Transformer, a sequence-transduction architecture based **entirely on attention mechanisms**, dispensing with recurrence and convolutions.",
          findings: "- BLEU 28.4 on WMT 2014 En→De (+2.0 over best prior)\n- BLEU 41.8 on WMT 2014 En→Fr after 3.5d on 8 GPUs\n- 8 attention heads enable diverse relations\n- Sinusoidal positional encodings preserve relative order",
          methodology: "Encoder–decoder stack with 6 identical layers each. Self-attention + feed-forward sublayers wrapped with residual connections and layer norm. Trained with label smoothing 0.1, Adam (β1=0.9, β2=0.98).",
          bias: "Evaluated only on translation; generalization claims not extensively validated. Hardware constraints limit baseline comparisons. No statistical-significance testing.",
          gaps: "- Scaling to 100B+ parameters\n- Post-hoc interpretability of attention\n- Low-resource language performance",
          wordCount: 8123,
        },
        confidence: 95,
      }),
      chatAboutPaper: (msg) => {
        const last = (msg.history || []).slice(-1)[0]?.text || "";
        return { reply: `Re: "${last.slice(0,60)}…" — The paper's main contribution is the **Transformer**: self-attention replaces recurrence, enabling full parallelization. Key win: BLEU 28.4 on WMT En→De.` };
      },
      findRelated: () => ({ items: [
        { title: "Layer Normalization", authors: "Ba J., Kiros J. R., Hinton G. E.", year: 2016, url: "https://arxiv.org/abs/1607.06450" },
        { title: "Neural Machine Translation by Jointly Learning to Align and Translate", authors: "Bahdanau D., Cho K., Bengio Y.", year: 2014, url: "https://arxiv.org/abs/1409.0473" },
        { title: "Convolutional Sequence to Sequence Learning", authors: "Gehring J. et al.", year: 2017, url: "https://arxiv.org/abs/1705.03122" },
      ] }),
      buildCitation: (msg) => ({
        apa: `${msg.paper.authors||"Unknown Author"} (${msg.paper.year||"n.d."}). ${msg.paper.title}. ${msg.paper.source||""}. ${msg.paper.doi?'https://doi.org/'+msg.paper.doi:''}`,
        mla: `${msg.paper.authors||"Unknown"}. "${msg.paper.title}." ${msg.paper.source||""}, ${msg.paper.year||"n.d."}.`,
        bibtex: `@article{Vaswani${msg.paper.year||2017},\n  title={${msg.paper.title}},\n  author={${msg.paper.authors||"Unknown"}},\n  year={${msg.paper.year||2017}}\n}`,
      }),
      testApiKey: () => ({ ok: true }),
    };

    window.chrome = {
      storage: { local: proxy("local"), session: proxy("session") },
      runtime: {
        onMessage: { addListener: (fn) => listeners.push(fn) },
        sendMessage: (msg) => {
          const fn = responses[msg.action];
          if (!fn) return Promise.resolve({ error: "unknown action" });
          // Simulate ~500ms latency for analysis to test loading state.
          const lat = msg.action === "analyzePaper" ? 800 : msg.action === "chatAboutPaper" ? 600 : 200;
          return new Promise((res) => setTimeout(() => res(fn(msg)), lat));
        },
        openOptionsPage: () => window.open("../options.html", "_blank"),
        lastError: null,
      },
      tabs: {
        query: () => Promise.resolve([{ id: 1, url: "https://arxiv.org/abs/1706.03762", title: "[1706.03762] Attention Is All You Need" }]),
        sendMessage: () => Promise.resolve({ text: "page text", title: "page title" }),
        create: ({ url }) => window.open(url, "_blank"),
      },
      sidePanel: { open: () => Promise.resolve() },
      scripting: { executeScript: () => Promise.resolve() },
    };
  })();
  </script>

  <div class="app" id="app">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">S</div>
        <div>
          <span class="brand-name">ScholarAI</span>
          <span class="brand-tag">test</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button class="icon-btn" id="expandBtn" title="Open side panel" aria-label="Open side panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M15 3v18"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="analyze" role="tab">Analyze</button>
      <button class="tab" data-tab="chat" role="tab">Chat</button>
      <button class="tab" data-tab="library" role="tab">Library</button>
    </nav>

    <main class="content">
      <section class="pane active" id="pane-analyze" role="tabpanel">
        <div id="analyzeHome">
          <div class="drop-zone" id="dropZone" tabindex="0" role="button">
            <div class="drop-zone-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
            <div class="drop-zone-title">Drop a PDF or click to upload</div>
            <div class="drop-zone-hint">PDFs up to 20MB</div>
          </div>
          <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" class="sr-only">
          <div class="divider">or paste a link</div>
          <div class="input-group">
            <input type="url" id="urlInput" class="input" placeholder="arXiv, PubMed, Nature URL…">
            <button class="btn btn-primary" id="urlBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
          </div>
          <button class="btn btn-secondary btn-block" id="pageBtn" style="margin-top:10px;">Analyze current tab</button>
          <div class="stat-row">
            <div class="stat"><div class="stat-value" id="statPapers">0</div><div class="stat-label">Papers</div></div>
            <div class="stat"><div class="stat-value" id="statChats">0</div><div class="stat-label">Questions</div></div>
            <div class="stat"><div class="stat-value" id="statTime">0s</div><div class="stat-label">Avg time</div></div>
          </div>
        </div>

        <div id="analyzeLoading" class="hidden">
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">…</div>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
            <button class="btn btn-ghost" id="cancelAnalyzeBtn" type="button" style="margin-top:8px;font-size:11px;">Cancel</button>
          </div>
        </div>

        <div id="analyzeResults" class="hidden">
          <div style="display:flex;gap:6px;margin-bottom:10px;">
            <button class="btn btn-ghost" id="backBtn" style="padding:6px 10px;font-size:11px;">← Back</button>
            <div style="flex:1"></div>
            <button class="btn btn-ghost" id="chatFromResults" style="padding:6px 10px;font-size:11px;">Ask questions →</button>
          </div>
          <div class="card"><div class="card-title">Paper</div><div class="card-body" id="resTitle" style="font-weight:600;color:var(--text-0);"></div><div class="card-body" id="resMeta" style="font-size:11px;color:var(--text-2);margin-top:4px;"></div></div>
          <div class="card"><div class="card-title">Summary</div><div class="card-body md-content" id="resSummary"></div></div>
          <div class="card"><div class="card-title">Key findings</div><div class="card-body md-content" id="resFindings"></div></div>
          <div class="card"><div class="card-title">Methodology</div><div class="card-body md-content" id="resMethod"></div></div>
          <div class="card"><div class="card-title">Bias &amp; limitations</div><div class="card-body md-content" id="resBias"></div></div>
          <div class="card"><div class="card-title">Research gaps</div><div class="card-body md-content" id="resGaps"></div></div>
          <div class="card hidden" id="relatedCard"><div class="card-title">Related papers</div><div class="card-body" id="relatedList"></div></div>
          <div class="btn-row">
            <button class="btn btn-secondary" id="copyCiteBtn">Copy cite</button>
            <button class="btn btn-secondary" id="exportBtn">Export</button>
          </div>
          <div class="stat-row">
            <div class="stat"><div class="stat-value" id="resConf">—</div><div class="stat-label">Confidence</div></div>
            <div class="stat"><div class="stat-value" id="resTime">—</div><div class="stat-label">Time</div></div>
            <div class="stat"><div class="stat-value" id="resWords">—</div><div class="stat-label">Words</div></div>
          </div>
        </div>
      </section>

      <section class="pane" id="pane-chat" role="tabpanel">
        <div class="chat-shell">
          <div class="chat-context empty" id="chatContext"><span class="chat-context-dot"></span><span id="chatContextLabel">No paper loaded.</span></div>
          <div class="suggestion-row" id="suggestionRow">
            <button class="chip" data-q="What is the main contribution?">Main contribution?</button>
            <button class="chip" data-q="Explain the methodology step by step.">Explain methods</button>
            <button class="chip" data-q="What are the key limitations?">Limitations</button>
            <button class="chip" data-q="How does this compare to prior work?">Vs prior work</button>
          </div>
          <div class="chat-msgs" id="chatMsgs"></div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask anything about this paper…" disabled></textarea>
            <button class="send-btn" id="chatSendBtn" disabled aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
        </div>
      </section>

      <section class="pane" id="pane-library" role="tabpanel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:11px;color:var(--text-2);" id="libraryCount">0 papers</div>
          <button class="btn btn-ghost" id="libraryClearBtn" style="padding:4px 8px;font-size:11px;">Clear all</button>
        </div>
        <div id="libraryList"></div>
      </section>
    </main>

    <div id="toastMount"></div>
  </div>

  <script src="../popup.js"></script>
</body>
</html>
